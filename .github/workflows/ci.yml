name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Rust — check, clippy, test ────────────────────────────────────────────
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (from rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: wasm32-wasip2
          components: rustfmt,clippy,rust-src

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "hostmgr-rust"

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo check (native targets — providers, agent, CLI)
        run: |
          cargo check \
            -p hostmgr-types \
            -p hostmgr-protocol \
            -p hostmgr-provider-discovery \
            -p hostmgr-provider-identification \
            -p hostmgr-provider-credentials \
            -p hostmgr-provider-mcp-client \
            -p hostmgr-agent \
            -p hostmgr

      # Actor crates require WIT dependency vendoring that is handled by
      # `wash build`. Plain `cargo check --target wasm32-wasip2` will not work
      # without vendored WIT deps. Actors are compiled in the build-actors job
      # below (uses `wash build` which fetches and vendors WIT deps automatically).

      - name: cargo clippy (native)
        run: |
          cargo clippy \
            -p hostmgr-types \
            -p hostmgr-protocol \
            -p hostmgr-agent \
            -p hostmgr \
            -- -D warnings

      - name: cargo test
        run: cargo test -p hostmgr-types -p hostmgr-protocol

  # ── TypeScript / React UI ─────────────────────────────────────────────────
  ui:
    name: UI (TypeScript)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ui/package.json

      - name: npm install
        working-directory: ui
        run: npm install

      - name: Type check
        working-directory: ui
        run: npm run type-check

      - name: Lint
        working-directory: ui
        run: npm run lint || true   # warn-only until lint is fully configured

      - name: Build
        working-directory: ui
        run: npm run build

  # ── Helm chart lint ───────────────────────────────────────────────────────
  helm:
    name: Helm lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: "3.16"

      - name: helm lint
        run: helm lint deploy/charts/hostmgr
