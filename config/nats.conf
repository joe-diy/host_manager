# NATS server configuration for Host Manager
#
# Primary agent transport: WebSocket over TLS 1.3 on port 443 (ADR-005)
# Dev transport: plain TCP on port 4222 (docker compose dev stack only)
#
# In production, replace the self-signed certs with real TLS certificates
# (e.g. from Let's Encrypt) and remove the plain TCP listener.

server_name: "hostmgr-nats"

# JetStream — durable command delivery and KV buckets
jetstream {
  store_dir: "/data"
  max_memory_store: 512MB
  max_file_store:   4GB
}

# ── Plain TCP (development only) ─────────────────────────────────────────────
port: 4222

# ── WebSocket over TLS (primary agent transport) ──────────────────────────────
websocket {
  port: 443
  tls {
    cert_file:  "/etc/nats/tls/server.crt"
    key_file:   "/etc/nats/tls/server.key"
    # Require TLS 1.3; NATS uses the Go tls package — min_version maps to
    # tls.VersionTLS13. This guarantees ECDHE (Perfect Forward Secrecy).
    min_version: "1.3"
  }
  # Allow browser/agent WebSocket connections
  no_auth_user: ""
}

# ── HTTP monitoring ────────────────────────────────────────────────────────────
http_port: 8222

# ── Authorization ─────────────────────────────────────────────────────────────
# Per-agent NKey credentials are provisioned by the agent-coordinator actor.
# Each agent connects with its own NKey (Ed25519 public key pinned here is
# the operator key; agent keys are delegated user keys).
#
# operator: "path/to/operator.nk"   # uncomment in production

# ── Limits ────────────────────────────────────────────────────────────────────
max_payload: 1MB
max_connections: 10000
